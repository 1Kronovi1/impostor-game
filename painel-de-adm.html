<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMPOSTOR — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --green: #39ff14; --red: #ff2244;
    --yellow: #ffd600; --card: #1a1a1a; --card2: #222;
    --text: #f0f0f0; --muted: #888; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 28px 16px; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(255,34,68,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(57,255,20,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .wrap { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; position: relative; z-index: 1; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 4px; color: var(--red); text-shadow: 0 0 20px rgba(255,34,68,0.4); text-align: center; }
  h1 span { color: var(--green); }
  .card { background: var(--card); border-radius: var(--radius); padding: 18px; border: 2px solid #222; }
  .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--yellow); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .srow { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #252525; font-size: 14px; }
  .srow:last-child { border-bottom: none; }
  .srow .lbl { color: var(--muted); }
  .srow .val { font-weight: 900; }
  .green { color: var(--green); } .red { color: var(--red); } .yellow { color: var(--yellow); }
  .plist { display: flex; flex-direction: column; gap: 8px; }
  .pitem { display: flex; align-items: center; gap: 10px; background: var(--card2); border-radius: 10px; padding: 8px 12px; }
  .pitem .av { font-size: 24px; }
  .pitem .info { flex: 1; }
  .pitem .info .name { font-weight: 900; font-size: 14px; }
  .pitem .info .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ping { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 700; white-space: nowrap; }
  .ping-ok { background: rgba(57,255,20,0.15); color: var(--green); }
  .ping-warn { background: rgba(255,214,0,0.15); color: var(--yellow); }
  .ping-dead { background: rgba(255,34,68,0.15); color: var(--red); }
  .kick-btn { background: var(--red); border: none; border-radius: 8px; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1px; padding: 5px 12px; cursor: pointer; }
  .kick-btn:hover { opacity: 0.8; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
  .btn:active { transform: scale(0.97); }
  .btn-red { background: var(--red); color: #fff; }
  .btn-red:hover { box-shadow: 0 0 18px rgba(255,34,68,0.5); }
  .btn-yellow { background: var(--yellow); color: #000; }
  .btn-yellow:hover { box-shadow: 0 0 18px rgba(255,214,0,0.4); }
  .btn-outline { background: transparent; border: 2px solid #444; color: var(--muted); font-size: 16px; padding: 10px; }
  .btn-outline:hover { border-color: var(--green); color: var(--green); }
  .btns { display: flex; flex-direction: column; gap: 10px; }
  .confirm { display: none; background: #1a0a0e; border: 2px solid var(--red); border-radius: var(--radius); padding: 18px; text-align: center; }
  .confirm.show { display: block; }
  .confirm p { font-size: 13px; color: #ff9999; margin-bottom: 14px; line-height: 1.6; }
  .confirm-btns { display: flex; gap: 10px; }
  .confirm-btns .btn { flex: 1; padding: 12px; font-size: 17px; }
  .log { background: #0a0a0a; border-radius: 10px; padding: 12px; font-size: 12px; font-family: monospace; max-height: 200px; overflow-y: auto; line-height: 2; border: 1px solid #1a1a1a; white-space: pre-wrap; }
  .ok { color: var(--green); } .err { color: var(--red); } .warn { color: var(--yellow); } .info { color: #aaa; }
  .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 10px 0; }
</style>
</head>
<body>
<!-- LOGIN -->
<div id="login-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;position:relative;z-index:1;">
  <h1 style="font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;color:var(--red);text-shadow:0 0 20px rgba(255,34,68,0.4);">ADMIN <span style="color:var(--green);">⚡</span></h1>
  <div style="background:var(--card);border-radius:14px;padding:28px 24px;width:100%;max-width:340px;border:2px solid #222;display:flex;flex-direction:column;gap:12px;">
    <input id="login-user" type="text" placeholder="Login" style="background:var(--card2);border:2px solid #333;border-radius:12px;padding:12px 16px;font-size:16px;font-family:'Nunito',sans-serif;color:var(--text);outline:none;width:100%;">
    <input id="login-pass" type="password" placeholder="Senha" style="background:var(--card2);border:2px solid #333;border-radius:12px;padding:12px 16px;font-size:16px;font-family:'Nunito',sans-serif;color:var(--text);outline:none;width:100%;">
    <button onclick="doLogin()" style="background:var(--green);border:none;border-radius:12px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;color:#000;">ENTRAR</button>
    <div id="login-err" style="color:var(--red);font-size:13px;text-align:center;display:none;">Login ou senha incorretos.</div>
  </div>
</div>

<div class="wrap" id="admin-panel" style="display:none;">
  <h1>ADMIN <span>⚡</span></h1>

  <div class="card">
    <div class="card-title">📊 STATUS <span id="ri" style="font-size:12px;color:var(--muted);font-weight:400;font-family:'Nunito',sans-serif;"></span></div>
    <div class="srow"><span class="lbl">Fase</span><span class="val" id="s-phase">—</span></div>
    <div class="srow"><span class="lbl">Jogadores online</span><span class="val green" id="s-count">—</span></div>
    <div class="srow"><span class="lbl">Turno</span><span class="val yellow" id="s-turn">—</span></div>
    <div class="srow"><span class="lbl">Tema</span><span class="val" id="s-theme">—</span></div>
    <div class="srow"><span class="lbl">Personagem</span><span class="val green" id="s-char">—</span></div>
    <div class="srow"><span class="lbl">Impostor</span><span class="val red" id="s-imp">—</span></div>
  </div>

  <div class="card">
    <div class="card-title">👥 JOGADORES</div>
    <div class="plist" id="plist"><div class="empty">Carregando...</div></div>
  </div>

  <div class="card">
    <div class="card-title">⚡ AÇÕES</div>
    <div class="btns">
      <button class="btn btn-yellow" onclick="ask('reset')">🔄 REINICIAR PARA LOBBY</button>
      <button class="btn btn-red" onclick="ask('kill')">💀 KILL — ZERAR TUDO</button>
      <button class="btn btn-outline" onclick="ask('cache')">🧹 FORÇAR LOGOUT DE TODOS</button>
    </div>
  </div>

  <div class="confirm" id="confirm">
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="btn btn-red" onclick="doAction()">✓ CONFIRMAR</button>
      <button class="btn btn-outline" onclick="cancelAction()">CANCELAR</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📋 LOG</div>
    <div class="log" id="log"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCcAKssL2eNsLmnX0OD5ppNhTdgWgYOBs4",
  authDomain: "projeto-jogo-impostor.firebaseapp.com",
  projectId: "projeto-jogo-impostor",
  storageBucket: "projeto-jogo-impostor.firebasestorage.app",
  messagingSenderId: "15529927986",
  appId: "1:15529927986:web:4e9b9488da6a6ab854232b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let pendingAction = null;

// ── LOGIN ──────────────────────────────────────────────────
window.doLogin = function() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const err  = document.getElementById('login-err');
  if (user === 'admin' && pass === '9876543210') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'flex';
    loadData();
    log('Login realizado com sucesso.', 'ok');
  } else {
    err.style.display = 'block';
    setTimeout(() => { err.style.display = 'none'; }, 2500);
  }
};

// Allow Enter key on password field
document.addEventListener('DOMContentLoaded', () => {
  const passEl = document.getElementById('login-pass');
  if (passEl) passEl.addEventListener('keydown', e => { if (e.key === 'Enter') window.doLogin(); });
  const userEl = document.getElementById('login-user');
  if (userEl) userEl.addEventListener('keydown', e => { if (e.key === 'Enter') window.doLogin(); });
});

function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('pt-BR');
  el.innerHTML = `<span class="${type}">[${t}] ${msg}</span>\n` + el.innerHTML;
}

async function loadData() {
  document.getElementById('ri').textContent = '↻';
  try {
    const gameSnap = await getDoc(doc(db, 'game', 'state'));
    if (gameSnap.exists()) {
      const g = gameSnap.data();
      const labels = { lobby:'LOBBY', reveal:'REVELAÇÃO', playing:'JOGANDO', ended:'ENCERRADO' };
      const colors = { lobby:'yellow', reveal:'yellow', playing:'green', ended:'red' };
      const el = document.getElementById('s-phase');
      el.textContent = labels[g.phase] || g.phase || '—';
      el.className = 'val ' + (colors[g.phase] || '');
      document.getElementById('s-turn').textContent = g.turn || '—';
      document.getElementById('s-theme').textContent = g.theme || '—';
      document.getElementById('s-char').textContent = g.character || '—';
      document.getElementById('s-imp').textContent = g.impostorName || '—';
    } else {
      document.getElementById('s-phase').textContent = 'SEM DADOS';
      document.getElementById('s-phase').className = 'val red';
    }

    const snap = await getDocs(collection(db, 'players'));
    const players = [];
    snap.forEach(d => players.push(d.data()));
    players.sort((a,b) => (a.joinedAt||0) - (b.joinedAt||0));
    document.getElementById('s-count').textContent = players.length;

    const plist = document.getElementById('plist');
    if (!players.length) {
      plist.innerHTML = '<div class="empty">Nenhum jogador online</div>';
    } else {
      plist.innerHTML = '';
      players.forEach(p => {
        const ago = p.lastSeen ? Math.round((Date.now() - p.lastSeen) / 1000) : 999;
        const cls = ago < 15 ? 'ping-ok' : ago < 30 ? 'ping-warn' : 'ping-dead';
        const label = ago < 15 ? '● ONLINE' : ago < 30 ? '● LENTO' : '● OFFLINE';
        // Render avatar — handle object {url,name}, base64 string, or emoji
        function renderAv(av) {
          if (!av) return '<span style="font-size:24px">👤</span>';
          if (typeof av === 'object' && av.url) {
            return `<img src="${av.url}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;" onerror="this.outerHTML='👤'">`;
          }
          if (typeof av === 'string' && av.startsWith('data:')) {
            return `<img src="${av}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">`;
          }
          return `<span style="font-size:24px">${av}</span>`;
        }

        const item = document.createElement('div');
        item.className = 'pitem';
        item.innerHTML = `
          <div class="av">${renderAv(p.avatar)}</div>
          <div class="info">
            <div class="name">${p.name}${p.isAdmin?' 👑':''}</div>
            <div class="meta">ping: ${ago}s atrás</div>
          </div>
          <span class="ping ${cls}">${label}</span>
          <button class="kick-btn">KICK</button>
        `;
        item.querySelector('.kick-btn').onclick = () => kickPlayer(p.id, p.name);
        plist.appendChild(item);
      });
    }
  } catch(e) {
    log('Erro ao carregar: ' + e.message, 'err');
  }
  document.getElementById('ri').textContent = '';
}

window.kickPlayer = async function(id, name) {
  try {
    await deleteDoc(doc(db, 'players', id));
    log(`Jogador "${name}" removido.`, 'warn');
  } catch(e) { log('Erro kick: ' + e.message, 'err'); }
};

window.ask = function(action) {
  pendingAction = action;
  const msgs = {
    kill: '💀 Apaga TUDO: jogadores, papéis, votos e estado. Todos serão desconectados imediatamente.',
    reset: '🔄 Apaga papéis e votos. Mantém jogadores. Jogo volta ao lobby.',
    cache: '🧹 Grava sinal no Firebase. Todos que recarregarem a página serão deslogados automaticamente.'
  };
  document.getElementById('confirm-msg').textContent = msgs[action];
  document.getElementById('confirm').classList.add('show');
};

window.cancelAction = () => {
  document.getElementById('confirm').classList.remove('show');
  pendingAction = null;
};

window.doAction = async function() {
  document.getElementById('confirm').classList.remove('show');
  const a = pendingAction; pendingAction = null;
  if (a === 'kill') await doKill();
  else if (a === 'reset') await doReset();
  else if (a === 'cache') await doForceLogout();
};

async function deleteCollection(name) {
  const snap = await getDocs(collection(db, name));
  if (snap.empty) { log(`  "${name}": vazia`, 'info'); return; }
  const batch = writeBatch(db);
  snap.forEach(d => batch.delete(doc(db, name, d.id)));
  await batch.commit();
  log(`  "${name}": ${snap.size} doc(s) apagado(s)`, 'info');
}

async function doKill() {
  log('⚡ Iniciando KILL...', 'warn');
  try {
    for (const col of ['players','roles','votes','admin']) await deleteCollection(col);
    try { await deleteDoc(doc(db, 'game', 'state')); log('  "game/state": apagado', 'info'); } catch(e){}
    log('✅ KILL completo! Banco zerado.', 'ok');
  } catch(e) { log('❌ Erro: ' + e.message, 'err'); }
}

async function doReset() {
  log('🔄 Reiniciando jogo...', 'warn');
  try {
    for (const col of ['roles','votes']) await deleteCollection(col);
    await setDoc(doc(db, 'game', 'state'), {
      phase: 'lobby', turn: 1,
      theme: null, character: null,
      impostorId: null, impostorName: null, readyPlayers: {}
    });
    log('✅ Jogo reiniciado para lobby!', 'ok');
  } catch(e) { log('❌ Erro: ' + e.message, 'err'); }
}

async function doForceLogout() {
  log('🧹 Enviando sinal de logout forçado...', 'warn');
  try {
    // Grava na coleção admin/commands — o jogo.html escuta isso via onSnapshot
    await setDoc(doc(db, 'admin', 'commands'), {
      forceLogout: true,
      logoutAt: Date.now()
    });
    log('✅ Sinal gravado! Todos serão deslogados ao recarregar a página.', 'ok');
  } catch(e) { log('❌ Erro: ' + e.message, 'err'); }
}

// Listeners em tempo real
onSnapshot(collection(db, 'players'), loadData);
onSnapshot(doc(db, 'game', 'state'), loadData);

loadData();
log('Painel conectado.', 'ok');
</script>
</div>
</body>
</html>
